name: Daily ETL

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 台灣時間 08:00
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      MOA_API_KEY:  ${{ secrets.MOA_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    outputs:
      latest_trade_date: ${{ steps.summary.outputs.latest_trade_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # MOA 當日行情在早上 8 點通常尚未全數上架，所以先補抓昨日再抓今日，
      # 雙保險讓 latest.json 永遠有最新可用資料。
      - name: Fetch yesterday's prices
        run: |
          YESTERDAY=$(python -c "from datetime import date,timedelta; print(date.today()-timedelta(days=1))")
          python -m etl.fetch_prices --date "$YESTERDAY"

      - name: Fetch today's prices
        run: python -m etl.fetch_prices

      - name: Export JSON for frontend
        run: python -m etl.export_json

      - name: Read latest trade date from export
        id: summary
        run: |
          LATEST=$(python -c "import json,sys; d=json.load(open('data/latest.json')); print(d.get('trade_date') or '')")
          echo "latest_trade_date=$LATEST" >> "$GITHUB_OUTPUT"
          {
            echo "## 📅 資料抓取結果"
            echo ""
            echo "| 項目 | 內容 |"
            echo "|---|---|"
            echo "| 最新交易日 (trade_date) | \`${LATEST:-（無資料）}\` |"
            echo "| 執行時間 (UTC) | \`$(date -u +'%Y-%m-%d %H:%M:%S')\` |"
            echo "| 執行時間 (台灣) | \`$(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M:%S')\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "✓ 最新交易日：$LATEST"

      - name: Update cache-busting timestamp in index.html
        run: |
          # 更新 index.html 中的快取破壞註解，強制瀏覽器重新加載
          TIMESTAMP=$(date +%s%3N)  # 毫秒級時間戳
          sed -i "s|<!-- cache-buster: .* -->|<!-- cache-buster: ${TIMESTAMP} -->|g" index.html
          if ! grep -q "cache-buster:" index.html; then
            # 若不存在，在 closing head 前添加
            sed -i "/<\/head>/i\  <!-- cache-buster: ${TIMESTAMP} -->" index.html
          fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: update ${{ steps.summary.outputs.latest_trade_date }}" && git push
