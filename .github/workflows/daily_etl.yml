name: Daily ETL

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 02:00 = 台灣時間 10:00
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: agri_prices.db
          # run_id 保證每次都寫入新 cache，restore-keys 確保讀取最近一筆
          # 避免 hashFiles('db.py') 導致 schema 異動時資料庫從零重建
          key: agri-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            agri-db-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch today's prices
        run: python -m etl.fetch_prices

      - name: Export JSON for frontend
        run: python -m etl.export_json

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: update $(date -u +'%Y-%m-%d')" && git push
