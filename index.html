<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>台北菜價追蹤</title>
  <!-- cache-buster: 1777170726829 -->

  <!-- Tailwind CSS v4 Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- D3.js v7 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <!-- Fuse.js v7 -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>

  <!-- Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * { font-family: 'Noto Sans TC', sans-serif; }

    /* D3 axis styling */
    .axis text { fill: #94a3b8; font-size: 11px; }
    .axis line, .axis path { stroke: #e2e8f0; }
    .axis .domain { stroke: #e2e8f0; }
    .grid line { stroke: #f1f5f9; stroke-dasharray: 3 3; }
    .grid path { stroke: none; }

    /* Shared tooltip */
    #chart-tooltip {
      position: fixed;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      pointer-events: none;
      box-shadow: 0 8px 24px -4px rgba(0,0,0,0.10);
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 50;
      min-width: 160px;
    }

    /* Active days button */
    .days-btn.active {
      background-color: #ecfdf5;
      color: #059669;
      font-weight: 600;
    }

    /* History modal tab */
    .hm-tab.active {
      color: #059669;
      border-bottom-color: #059669;
      font-weight: 600;
    }

    /* History modal slide-up */
    @media (max-width: 640px) {
      #history-modal > div {
        animation: slideUp 0.22s ease-out;
      }
    }

    /* Crop card ring on selection */
    .crop-card.selected {
      outline: 2px solid #34d399;
      outline-offset: 2px;
    }

    /* Market type pill buttons */
    .market-type-btn {
      transition: all 0.12s;
    }
    .market-type-btn.active {
      background-color: #ecfdf5;
      border-color: #34d399;
      color: #059669;
      font-weight: 600;
    }

    /* Modal slide-up on mobile */
    @media (max-width: 640px) {
      #retail-modal > div {
        animation: slideUp 0.2s ease-out;
      }
      @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
    }

    /* Search dropdown item */
    .search-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #f1f5f9;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover,
    .search-item.active {
      background-color: #f0fdf4;
    }
    .search-item .si-title {
      font-size: 14px;
      color: #1e293b;
      font-weight: 500;
    }
    .search-item .si-sub {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .search-item .si-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 9999px;
      background: #ecfdf5;
      color: #059669;
      font-weight: 600;
      margin-left: auto;
    }
    .search-item .si-badge.muted {
      background: #f1f5f9;
      color: #94a3b8;
      font-weight: 500;
    }
    .search-item mark {
      background: #fef3c7;
      color: #92400e;
      padding: 0 2px;
      border-radius: 2px;
    }

    /* Search empty / no-match in dropdown */
    .search-empty {
      padding: 18px 14px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }

    /* Not-found dialog slide */
    @media (max-width: 640px) {
      #notfound-modal > div {
        animation: slideUp 0.2s ease-out;
      }
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="bg-white border-b border-slate-100 sticky top-0 z-20 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-3 sm:gap-4">
      <div class="flex items-center gap-3 shrink-0">
        <span class="text-3xl leading-none select-none">🥦</span>
        <div class="hidden sm:block">
          <h1 class="text-base sm:text-lg font-bold text-slate-800 leading-tight">
            台北菜價追蹤
          </h1>
          <p class="text-xs text-slate-400">農業部大盤交易資料</p>
        </div>
      </div>

      <!-- Search bar -->
      <div class="flex-1 flex justify-end min-w-0">
        <div id="search-wrap" class="relative w-full max-w-xs">
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                   viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
              </svg>
            </span>
            <input id="search-input"
                   type="search"
                   inputmode="search"
                   autocomplete="off"
                   enterkeyhint="search"
                   placeholder="搜尋蔬果…"
                   class="w-full border border-slate-200 rounded-full pl-9 pr-9 py-2
                          text-sm bg-slate-50 focus:bg-white
                          focus:outline-none focus:ring-2 focus:ring-emerald-300
                          placeholder:text-slate-300"
                   aria-label="搜尋蔬果" aria-autocomplete="list" aria-controls="search-dropdown" />
            <button id="search-clear"
                    class="hidden absolute right-2.5 top-1/2 -translate-y-1/2
                           w-5 h-5 rounded-full text-slate-400 hover:text-slate-600
                           flex items-center justify-center text-xs"
                    aria-label="清除搜尋">✕</button>
          </div>

          <!-- Autocomplete dropdown -->
          <div id="search-dropdown"
               class="hidden absolute left-0 right-0 mt-2 bg-white rounded-xl
                      border border-slate-200 shadow-xl max-h-[60vh] overflow-y-auto z-30"
               role="listbox"></div>
        </div>
      </div>

      <span id="updated-at" class="text-xs text-slate-400 shrink-0 hidden md:inline"></span>
    </div>
  </header>

  <!-- ── Loading ────────────────────────────────────────────────────────── -->
  <div id="loading" class="flex flex-col items-center justify-center min-h-[70vh] gap-3">
    <div class="w-8 h-8 rounded-full border-2 border-emerald-400 border-t-transparent animate-spin"></div>
    <p class="text-sm text-slate-400">載入資料中…</p>
  </div>

  <!-- ── Error / Empty ──────────────────────────────────────────────────── -->
  <div id="empty-state" class="hidden flex-col items-center justify-center min-h-[70vh] gap-3 text-center px-6">
    <div class="text-5xl mb-2">🌱</div>
    <p class="font-semibold text-slate-700">資料尚未就緒</p>
    <p class="text-sm text-slate-400 max-w-xs">
      請先執行 ETL Pipeline 抓取資料後，再重新整理此頁面。
    </p>
    <code class="mt-2 text-xs bg-slate-100 px-3 py-1.5 rounded-lg text-slate-600">
      python -m etl.fetch_prices &amp;&amp; python -m etl.export_json
    </code>
  </div>

  <!-- ── Main App ────────────────────────────────────────────────────────── -->
  <main id="app" class="hidden max-w-6xl mx-auto px-4 sm:px-6 py-8 space-y-10">

    <!-- Summary Cards -->
    <section>
      <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">
        最新行情
      </h2>
      <div id="summary-cards" class="grid grid-cols-1 sm:grid-cols-3 gap-4"></div>
    </section>

    <!-- User Reports Panel (hidden until data exists) -->
    <section id="reports-section" class="hidden">
      <div class="flex items-baseline gap-3 mb-3">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">
          我的回填記錄
        </h2>
        <button id="clear-reports-btn"
                class="text-xs text-rose-300 hover:text-rose-500 transition-colors">
          清除全部
        </button>
      </div>
      <div id="reports-content"></div>
    </section>

    <!-- Trend Chart -->
    <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-6 pt-6 pb-4 flex flex-wrap items-center justify-between gap-3 border-b border-slate-100">
        <h2 class="text-sm font-semibold text-slate-700">價格走勢</h2>
        <div class="flex flex-wrap items-center gap-2">
          <!-- Crop select -->
          <select
            id="crop-select"
            class="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white text-slate-700
                   focus:outline-none focus:ring-2 focus:ring-emerald-300 cursor-pointer"
          >
            <option value="青花菜">🥦 青花菜</option>
            <option value="牛番茄">🍅 牛番茄</option>
            <option value="洋蔥">🧅 洋蔥</option>
          </select>
          <!-- Days toggle -->
          <div class="flex rounded-lg border border-slate-200 overflow-hidden text-sm">
            <button class="days-btn active px-3 py-1.5 text-slate-500 border-r border-slate-200" data-days="30">30天</button>
            <button class="days-btn px-3 py-1.5 text-slate-500 border-r border-slate-200" data-days="60">60天</button>
            <button class="days-btn px-3 py-1.5 text-slate-500" data-days="90">90天</button>
          </div>
        </div>
      </div>
      <div class="px-6 pt-5 pb-2">
        <div id="trend-chart" class="w-full" style="height: 300px;"></div>
      </div>
      <div id="trend-legend" class="flex flex-wrap gap-5 px-6 pb-5 pt-1"></div>
    </section>

    <!-- Weekly Digest -->
    <section>
      <div class="flex items-baseline gap-3 mb-3">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">本週漲跌</h2>
        <span id="digest-label" class="text-xs text-slate-400"></span>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
          <p class="text-sm font-semibold text-emerald-600 mb-5">📈 漲幅排行</p>
          <div id="gainers-chart"></div>
        </div>
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
          <p class="text-sm font-semibold text-rose-500 mb-5">📉 跌幅排行</p>
          <div id="losers-chart"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Retail Price Input Modal ──────────────────────────────────────── -->
  <div id="retail-modal"
       class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-end sm:items-center
              justify-center z-50 hidden">
    <div class="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl">

      <h3 id="modal-crop-title" class="font-semibold text-slate-800 text-base mb-1"></h3>
      <p id="modal-wholesale-ref" class="text-xs text-slate-400 mb-5"></p>

      <div class="space-y-4">
        <!-- Retail price input -->
        <div>
          <label class="text-xs font-medium text-slate-500 mb-1.5 block">
            你買到的零售價
            <span class="text-slate-400 font-normal">（元 / 公斤）</span>
          </label>
          <input
            id="modal-retail-input"
            type="number" min="1" step="0.5"
            placeholder="例：65"
            class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm
                   focus:outline-none focus:ring-2 focus:ring-emerald-300"
          />
        </div>

        <!-- Market type -->
        <div>
          <label class="text-xs font-medium text-slate-500 mb-1.5 block">購買地點</label>
          <div class="flex flex-wrap gap-2">
            <button class="market-type-btn active text-xs px-3 py-1.5 rounded-full border border-slate-200 bg-white" data-type="超市">超市</button>
            <button class="market-type-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 bg-white" data-type="傳統市場">傳統市場</button>
            <button class="market-type-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 bg-white" data-type="量販店">量販店</button>
            <button class="market-type-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 bg-white" data-type="有機店">有機店</button>
          </div>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button id="modal-cancel"
                class="flex-1 text-sm text-slate-500 border border-slate-200
                       rounded-xl py-2.5 hover:bg-slate-50 transition-colors">
          取消
        </button>
        <button id="modal-submit"
                class="flex-1 text-sm bg-emerald-500 hover:bg-emerald-600
                       text-white rounded-xl py-2.5 font-medium transition-colors">
          確認儲存
        </button>
      </div>
    </div>
  </div>

  <!-- ── History Modal ─────────────────────────────────────────────────────── -->
  <div id="history-modal"
       class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-end sm:items-center
              justify-center z-50 hidden">
    <div class="bg-white w-full sm:max-w-2xl rounded-t-2xl sm:rounded-2xl shadow-2xl
                flex flex-col max-h-[90vh]">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 pt-5 pb-3 shrink-0">
        <div>
          <h3 id="hm-title" class="font-bold text-slate-800 text-base"></h3>
          <p class="text-xs text-slate-400 mt-0.5">四市場加權月均價・元／公斤</p>
        </div>
        <button id="hm-close"
                class="w-8 h-8 flex items-center justify-center rounded-full
                       text-slate-400 hover:bg-slate-100 hover:text-slate-600
                       transition-colors text-lg leading-none">✕</button>
      </div>

      <!-- YoY stat pills -->
      <div id="hm-stats" class="flex gap-3 px-6 pb-3 shrink-0 flex-wrap"></div>

      <!-- Chart -->
      <div class="px-4 pb-2 shrink-0" style="height:260px;">
        <div id="hm-chart" class="w-full h-full"></div>
      </div>

      <!-- Tab toggle -->
      <div class="flex border-t border-slate-100 shrink-0">
        <button class="hm-tab active flex-1 py-3 text-sm text-slate-500 border-b-2
                       border-transparent transition-colors" data-view="monthly">月均走勢</button>
        <button class="hm-tab flex-1 py-3 text-sm text-slate-500 border-b-2
                       border-transparent transition-colors" data-view="daily">近期日變化</button>
      </div>

    </div>
  </div>

  <!-- ── Not-Found Dialog ──────────────────────────────────────────────── -->
  <div id="notfound-modal"
       class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-end sm:items-center
              justify-center z-50 hidden">
    <div class="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl">
      <div class="flex items-start gap-3 mb-4">
        <div class="shrink-0 w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center">
          <span class="text-xl">🔍</span>
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="font-semibold text-slate-800 text-base">查無 <span id="nf-query" class="text-rose-500"></span></h3>
          <p class="text-xs text-slate-500 mt-1">我們找到最相近的品項：</p>
        </div>
      </div>

      <button id="nf-suggestion"
              class="w-full text-left border border-slate-200 rounded-xl p-4 mb-4
                     hover:border-emerald-300 hover:bg-emerald-50/50 transition-colors">
        <div class="flex items-center gap-3">
          <div class="flex-1 min-w-0">
            <div id="nf-suggestion-name" class="font-semibold text-slate-800"></div>
            <div id="nf-suggestion-sub"  class="text-xs text-slate-400 mt-0.5"></div>
          </div>
          <span id="nf-suggestion-badge" class="text-xs font-semibold text-emerald-600">是這個 →</span>
        </div>
      </button>

      <button id="nf-close"
              class="w-full text-sm text-slate-500 border border-slate-200
                     rounded-xl py-2.5 hover:bg-slate-50 transition-colors">
        都不是，重新搜尋
      </button>
    </div>
  </div>

  <!-- Shared tooltip -->
  <div id="chart-tooltip"></div>

  <!-- Footer -->
  <footer class="text-center text-xs text-slate-400 py-10">
    資料來源：
    <a
      href="https://data.moa.gov.tw"
      target="_blank"
      rel="noopener noreferrer"
      class="underline underline-offset-2 hover:text-slate-600 transition-colors"
    >農業部開放資料平台</a>
    ・每日 10:00 自動更新
  </footer>

  <script src="app.js"></script>
  <script>
    // Fallback: 若 app.js 尚未定義 init，則強制重新載入（快取相關）
    if (typeof init !== 'function') {
      window.location.reload();
    }
  </script>
</body>
</html>
